<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenVector</title>
    <meta
      name="description"
      content="OpenVector is a frontier multimodal reliability lab solving VLM hallucination."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600&display=swap"
      rel="stylesheet"
    >
    <style>
      :root {
        --surface: #f3eee4;
        --surface-low: #ece5d8;
        --ink: #171827;
        --muted: rgba(23, 24, 39, 0.78);
        --line: rgba(23, 24, 39, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        color: var(--ink);
        background:
          radial-gradient(circle at 13% 14%, rgba(23, 24, 39, 0.035), transparent 28rem),
          radial-gradient(circle at 86% 12%, rgba(23, 24, 39, 0.03), transparent 26rem),
          radial-gradient(circle at 83% 78%, rgba(23, 24, 39, 0.025), transparent 31rem),
          linear-gradient(180deg, #faf5ea 0%, var(--surface-low) 47%, var(--surface) 100%);
        font-family: "Barlow Semi Condensed", Bahnschrift, "DIN Alternate", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 18px;
        line-height: 1.64;
        letter-spacing: 0.01em;
      }

      a {
        color: inherit;
        text-decoration-thickness: 1px;
        text-underline-offset: 4px;
      }

      .page {
        position: relative;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
      }

      .page::before,
      .page::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      .page::before {
        background:
          linear-gradient(rgba(23, 24, 39, 0.018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 24, 39, 0.018) 1px, transparent 1px);
        background-size: 54px 54px;
        mask-image: radial-gradient(circle at 50% 34%, black 0%, transparent 66%);
      }

      .page::after {
        background:
          linear-gradient(120deg, transparent 0 41%, rgba(23, 24, 39, 0.02) 41.35% 41.55%, transparent 42%),
          linear-gradient(20deg, transparent 0 58%, rgba(23, 24, 39, 0.016) 58.25% 58.45%, transparent 59%);
        opacity: 0.45;
        mask-image: linear-gradient(180deg, black 0%, transparent 78%);
      }

      .cloud {
        position: absolute;
        z-index: 0;
        width: var(--w);
        height: calc(var(--w) * 0.42);
        opacity: var(--o, 1);
        transform: rotate(var(--r, 0deg));
        animation: cloud-drift var(--speed, 34s) ease-in-out infinite alternate;
        pointer-events: none;
      }

      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        inset: 0;
        background-repeat: no-repeat;
        background-size: 100% 100%;
        background-image: url("data:image/svg+xml,%3Csvg width='520' height='220' viewBox='0 0 520 220' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='rgba(23,24,39,0.07)' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M46 56h54M46 56v45M206 56h-54M206 56v45M46 166v-45M46 166h54M206 166v-45M206 166h-54'/%3E%3Cpath d='M285 78h48M285 78v38M458 78h-48M458 78v38M285 176v-38M285 176h48M458 176v-38M458 176h-48'/%3E%3Cpath d='M88 111h76M126 73v76M338 127h68M372 94v67'/%3E%3C/g%3E%3Cg stroke='rgba(23,24,39,0.045)' stroke-width='3' stroke-linecap='round'%3E%3Cpath d='M27 194h153M230 31h113M332 194h152M20 26h70'/%3E%3Ccircle cx='126' cy='111' r='11'/%3E%3Ccircle cx='372' cy='127' r='9'/%3E%3Cpath d='M236 111h32M252 95v32M246 111h12M252 105v12'/%3E%3C/g%3E%3C/svg%3E");
        animation: cloud-breathe 9s ease-in-out infinite;
        filter: blur(0.1px);
      }

      .cloud::after {
        transform: translate(10px, 8px) scale(0.96);
        opacity: 0.55;
      }

      .cloud.one {
        --w: 315px;
        --o: 0.2;
        --r: 8deg;
        --speed: 39s;
        --drift-x: 32px;
        --drift-y: 10px;
        --tilt: -2deg;
        top: 4%;
        left: -25px;
      }

      .cloud.two {
        --w: 300px;
        --o: 0.16;
        --r: 3deg;
        --speed: 46s;
        --drift-x: 42px;
        --drift-y: -6px;
        --tilt: 1deg;
        top: 24%;
        left: -47px;
      }

      .cloud.three {
        --w: 180px;
        --o: 0.13;
        --r: -2deg;
        --speed: 31s;
        --drift-x: -26px;
        --drift-y: 8px;
        --tilt: 2deg;
        top: 12%;
        left: 64%;
      }

      .cloud.four {
        --w: 278px;
        --o: 0.15;
        --r: -1deg;
        --speed: 37s;
        --drift-x: 34px;
        --drift-y: -10px;
        --tilt: -1deg;
        top: 58%;
        left: 4%;
      }

      .cloud.five {
        --w: 330px;
        --o: 0.16;
        --r: -4deg;
        --speed: 43s;
        --drift-x: -38px;
        --drift-y: 12px;
        --tilt: 2deg;
        top: 68%;
        right: 8%;
      }

      .cloud.six {
        --w: 390px;
        --o: 0.13;
        --r: 5deg;
        --speed: 51s;
        --drift-x: -44px;
        --drift-y: -8px;
        --tilt: -2deg;
        bottom: 6%;
        right: -20px;
      }

      .cloud.seven {
        --w: 245px;
        --o: 0.12;
        --r: -7deg;
        --speed: 35s;
        --drift-x: 30px;
        --drift-y: 14px;
        --tilt: 2deg;
        bottom: 10%;
        left: -30px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .intro-stage {
        position: relative;
        z-index: 2;
      }

      .hero {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        align-content: center;
        justify-items: center;
        padding: clamp(32px, 6vh, 56px) 24px;
        text-align: center;
      }

      .hero-inner {
        position: relative;
        z-index: 3;
        width: min(760px, 100%);
        animation: hero-rise 900ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .scroll-trace {
        width: min(520px, 82vw);
        max-height: 32vh;
        aspect-ratio: 820 / 360;
        margin: 0 auto clamp(10px, 2.5vh, 28px);
        opacity: 0.7;
        pointer-events: none;
      }

      .scroll-trace svg {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .infinity-ghost,
      .infinity-path {
        fill: none;
        stroke-linejoin: round;
        stroke-linecap: round;
      }

      .infinity-ghost {
        stroke: rgba(23, 24, 39, 0.12);
        stroke-width: 1.7;
        stroke-dasharray: 2 18;
      }

      .infinity-path {
        stroke: rgba(23, 24, 39, 0.48);
        stroke-width: 2.4;
      }

      .trace-head {
        fill: rgba(23, 24, 39, 0.5);
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .trace-head.is-visible {
        opacity: 1;
      }

      .hero-title {
        margin: 0 0 6px;
        font-size: clamp(52px, 7vw, 82px);
        line-height: 0.98;
        font-weight: 600;
        letter-spacing: 0;
      }

      .tagline {
        margin: 0 auto;
        max-width: 620px;
        color: var(--muted);
        font-size: clamp(20px, 2.3vw, 28px);
        line-height: 1.35;
        font-weight: 600;
        animation: tagline-appear 900ms cubic-bezier(0.16, 1, 0.3, 1) 180ms both;
      }

      .status-line {
        margin: 14px auto 0;
        color: rgba(23, 24, 39, 0.58);
        font-size: 14px;
        line-height: 1.4;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      @keyframes cloud-drift {
        from {
          transform: translate3d(0, 0, 0) rotate(var(--r, 0deg));
        }

        to {
          transform:
            translate3d(var(--drift-x, 28px), var(--drift-y, 8px), 0)
            rotate(calc(var(--r, 0deg) + var(--tilt, 1deg)));
        }
      }

      @keyframes cloud-breathe {
        0%,
        100% {
          opacity: 0.74;
        }

        50% {
          opacity: 1;
        }
      }

      @keyframes hero-rise {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes tagline-appear {
        from {
          opacity: 0;
          transform: translateY(9px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 720px) {
        body {
          font-size: 16px;
          line-height: 1.6;
        }

        .hero {
          padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
        }

        .scroll-trace {
          width: min(420px, 86vw);
          max-height: 28vh;
        }

        .hero-title {
          font-size: clamp(38px, 11.5vw, 54px);
          margin-bottom: 8px;
        }

        .tagline {
          max-width: 320px;
          font-size: clamp(18px, 5.2vw, 22px);
        }

        .status-line {
          margin-top: 10px;
          font-size: 12px;
        }

        .cloud.one {
          left: -125px;
        }

        .cloud.five {
          right: -110px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }

      }
    </style>
  </head>
  <body>
    <div class="page">
      <span class="cloud one" aria-hidden="true"></span>
      <span class="cloud two" aria-hidden="true"></span>
      <span class="cloud three" aria-hidden="true"></span>
      <span class="cloud four" aria-hidden="true"></span>
      <span class="cloud five" aria-hidden="true"></span>
      <span class="cloud six" aria-hidden="true"></span>
      <span class="cloud seven" aria-hidden="true"></span>

      <section class="intro-stage" aria-label="OpenVector introduction">
        <header class="hero">
          <div class="hero-inner">
            <div class="scroll-trace" aria-hidden="true">
              <svg viewBox="90 90 820 360">
                <path class="infinity-ghost"></path>
                <path class="infinity-path"></path>
                <circle class="trace-head" r="5" cx="776" cy="110"></circle>
              </svg>
            </div>
            <h1 class="hero-title">Open Vector</h1>
            <p class="tagline">
              The Frontier of Visual Reasoning
            </p>
            <p class="status-line">Currently in Stealth</p>
          </div>
        </header>
      </section>

    </div>
    <script>
      (() => {
        const ghost = document.querySelector(".infinity-ghost");
        const path = document.querySelector(".infinity-path");
        const head = document.querySelector(".trace-head");
        if (!ghost || !path || !head) {
          return;
        }

        const centerX = 500;
        const centerY = 270;
        const radiusX = 390;
        const radiusY = 160;
        const start = Math.PI / 4;
        const segments = 260;

        const pointAt = (progress) => {
          const t = start - Math.PI * 2 * progress;
          return {
            x: centerX + radiusX * Math.sin(t),
            y: centerY - radiusY * Math.sin(2 * t),
          };
        };

        const commands = [];
        for (let index = 0; index <= segments; index += 1) {
          const point = pointAt(index / segments);
          commands.push(`${index === 0 ? "M" : "L"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`);
        }

        ghost.setAttribute("d", commands.join(" "));

        let trailCount = -1;
        const setTrail = (progress) => {
          const count = Math.max(1, Math.round(segments * progress));
          if (count !== trailCount) {
            trailCount = count;
            path.setAttribute("d", commands.slice(0, count + 1).join(" "));
          }
        };

        const setHead = (progress) => {
          const point = pointAt(progress);
          head.setAttribute("cx", point.x.toFixed(2));
          head.setAttribute("cy", point.y.toFixed(2));
        };

        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReducedMotion) {
          setTrail(1);
          setHead(0.15);
          head.classList.add("is-visible");
          return;
        }

        const drawDuration = 2600;
        const orbitDuration = 4200;
        const startTime = performance.now();
        let orbitStartTime = null;

        const tick = (now) => {
          const elapsed = now - startTime;
          const drawProgress = Math.min(elapsed / drawDuration, 1);
          setTrail(drawProgress);

          if (drawProgress < 1) {
            setHead(drawProgress);
          } else {
            if (orbitStartTime === null) {
              orbitStartTime = now;
            }
            setHead(((now - orbitStartTime) / orbitDuration) % 1);
          }

          head.classList.add("is-visible");
          window.requestAnimationFrame(tick);
        };

        window.requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
